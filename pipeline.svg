<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#F8FAFC" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F3864">Telco Customer Churn — MLOps Pipeline</text>
  <line x1="60" y1="54" x2="840" y2="54" stroke="#2E5496" stroke-width="2"/>

  <!-- ── ROW 1: Data ── -->
  <!-- Raw Data -->
  <rect x="60" y="80" width="140" height="70" rx="10" fill="#2E5496"/>
  <text x="130" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Raw Data</text>
  <text x="130" y="126" text-anchor="middle" font-size="11" fill="#BDD7EE">CSV · 7,043 rows</text>
  <text x="130" y="142" text-anchor="middle" font-size="11" fill="#BDD7EE">21 columns</text>

  <!-- Arrow -->
  <line x1="200" y1="115" x2="238" y2="115" stroke="#2E5496" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Validation -->
  <rect x="240" y="80" width="140" height="70" rx="10" fill="#375623"/>
  <text x="310" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Validation</text>
  <text x="310" y="126" text-anchor="middle" font-size="11" fill="#C6EFCE">Great Expectations</text>
  <text x="310" y="142" text-anchor="middle" font-size="11" fill="#C6EFCE">23/23 checks ✓</text>

  <!-- Arrow -->
  <line x1="380" y1="115" x2="418" y2="115" stroke="#2E5496" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Preprocessing -->
  <rect x="420" y="80" width="140" height="70" rx="10" fill="#7B3F00"/>
  <text x="490" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Preprocessing</text>
  <text x="490" y="126" text-anchor="middle" font-size="11" fill="#FCE4D6">Clean · Fix types</text>
  <text x="490" y="142" text-anchor="middle" font-size="11" fill="#FCE4D6">Handle nulls</text>

  <!-- Arrow -->
  <line x1="560" y1="115" x2="598" y2="115" stroke="#2E5496" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Feature Engineering -->
  <rect x="600" y="80" width="160" height="70" rx="10" fill="#833C00"/>
  <text x="680" y="101" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Feature</text>
  <text x="680" y="117" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Engineering</text>
  <text x="680" y="136" text-anchor="middle" font-size="11" fill="#FCE4D6">Binary + One-hot</text>
  <text x="680" y="150" text-anchor="middle" font-size="11" fill="#FCE4D6">31 features</text>

  <!-- ── DOWN ARROW from Feature Engineering ── -->
  <line x1="680" y1="152" x2="680" y2="188" stroke="#2E5496" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── ROW 2: Model ── -->
  <!-- XGBoost Training -->
  <rect x="560" y="190" width="240" height="70" rx="10" fill="#2E5496"/>
  <text x="680" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="white">XGBoost Training</text>
  <text x="680" y="236" text-anchor="middle" font-size="11" fill="#BDD7EE">301 estimators · lr=0.034</text>
  <text x="680" y="252" text-anchor="middle" font-size="11" fill="#BDD7EE">scale_pos_weight=2.77</text>

  <!-- Arrow left to Optuna -->
  <line x1="560" y1="225" x2="522" y2="225" stroke="#2E5496" stroke-width="2" marker-end="url(#arrowleft)"/>

  <!-- Optuna Tuning -->
  <rect x="340" y="190" width="180" height="70" rx="10" fill="#4472C4"/>
  <text x="430" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Optuna Tuning</text>
  <text x="430" y="236" text-anchor="middle" font-size="11" fill="#BDD7EE">30 trials · Recall</text>
  <text x="430" y="252" text-anchor="middle" font-size="11" fill="#BDD7EE">Best recall: 0.866</text>

  <!-- Arrow left to MLflow -->
  <line x1="340" y1="225" x2="302" y2="225" stroke="#2E5496" stroke-width="2" marker-end="url(#arrowleft)"/>

  <!-- MLflow -->
  <rect x="100" y="190" width="200" height="70" rx="10" fill="#0070BA"/>
  <text x="200" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="white">MLflow Tracking</text>
  <text x="200" y="236" text-anchor="middle" font-size="11" fill="#BDD7EE">Metrics · Params</text>
  <text x="200" y="252" text-anchor="middle" font-size="11" fill="#BDD7EE">Artifacts · Model</text>

  <!-- ── DOWN ARROW from MLflow ── -->
  <line x1="200" y1="262" x2="200" y2="298" stroke="#2E5496" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── ROW 3: Metrics box ── -->
  <rect x="60" y="300" width="500" height="75" rx="10" fill="white" stroke="#2E5496" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="310" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E5496">Model Performance (Production Model)</text>
  <text x="140" y="345" text-anchor="middle" font-size="12" fill="#333">Precision: 0.490</text>
  <text x="260" y="345" text-anchor="middle" font-size="12" fill="#333">Recall: 0.821</text>
  <text x="390" y="345" text-anchor="middle" font-size="12" fill="#333">F1: 0.614</text>
  <text x="510" y="345" text-anchor="middle" font-size="12" fill="#333">ROC AUC: 0.837</text>
  <text x="310" y="366" text-anchor="middle" font-size="11" fill="#888">Threshold: 0.35 · Class imbalance handled via scale_pos_weight</text>

  <!-- ── DOWN ARROW from metrics ── -->
  <line x1="310" y1="376" x2="310" y2="412" stroke="#2E5496" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── ROW 4: Serving ── -->
  <!-- FastAPI -->
  <rect x="60" y="415" width="160" height="70" rx="10" fill="#107C10"/>
  <text x="140" y="443" text-anchor="middle" font-size="13" font-weight="bold" fill="white">FastAPI</text>
  <text x="140" y="461" text-anchor="middle" font-size="11" fill="#C6EFCE">POST /predict</text>
  <text x="140" y="477" text-anchor="middle" font-size="11" fill="#C6EFCE">GET /docs</text>

  <!-- Arrow -->
  <line x1="220" y1="450" x2="258" y2="450" stroke="#2E5496" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Gradio -->
  <rect x="260" y="415" width="160" height="70" rx="10" fill="#FF6B35"/>
  <text x="340" y="443" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Gradio UI</text>
  <text x="340" y="461" text-anchor="middle" font-size="11" fill="white">GET /ui</text>
  <text x="340" y="477" text-anchor="middle" font-size="11" fill="white">Web Interface</text>

  <!-- Arrow -->
  <line x1="420" y1="450" x2="458" y2="450" stroke="#2E5496" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Docker -->
  <rect x="460" y="415" width="160" height="70" rx="10" fill="#0DB7ED"/>
  <text x="540" y="443" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Docker</text>
  <text x="540" y="461" text-anchor="middle" font-size="11" fill="white">linux/amd64</text>
  <text x="540" y="477" text-anchor="middle" font-size="11" fill="white">uvicorn · port 8000</text>

  <!-- Arrow -->
  <line x1="620" y1="450" x2="658" y2="450" stroke="#2E5496" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Render -->
  <rect x="660" y="415" width="180" height="70" rx="10" fill="#46E3B7"/>
  <text x="750" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A1A1A">Render.com</text>
  <text x="750" y="456" text-anchor="middle" font-size="11" fill="#1A1A1A">Live Public URL</text>
  <text x="750" y="472" text-anchor="middle" font-size="10" fill="#1A1A1A">telco-churn-app-vvdq</text>
  <text x="750" y="486" text-anchor="middle" font-size="10" fill="#1A1A1A">.onrender.com</text>

  <!-- ── ROW 5: CI/CD ── -->
  <rect x="60" y="520" width="780" height="60" rx="10" fill="#1F3864"/>
  <text x="450" y="544" text-anchor="middle" font-size="13" font-weight="bold" fill="white">CI/CD — GitHub Actions</text>
  <text x="450" y="562" text-anchor="middle" font-size="11" fill="#BDD7EE">Push to main → Build linux/amd64 image → Push to Docker Hub → Redeploy on Render</text>

  <!-- Arrow from Render down to CI/CD -->
  <line x1="750" y1="487" x2="750" y2="518" stroke="#46E3B7" stroke-width="2" marker-end="url(#arrowgreen)"/>
  <!-- Arrow from Docker down to CI/CD -->
  <line x1="540" y1="487" x2="540" y2="518" stroke="#0DB7ED" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2E5496"/>
    </marker>
    <marker id="arrowleft" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#2E5496"/>
    </marker>
    <marker id="arrowgreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#46E3B7"/>
    </marker>
  </defs>
</svg>
